site_name: MarkFeyn
site_description: Render simple Feynman diagram code blocks as native SVG in MkDocs and ProperDocs.
theme:
  name: materialx
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy
    - content.code.select
    - content.tabs.link
plugins:
  - feynman-diagrams

markdown_extensions:
  
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: feynman
          class: language-feynman
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Syntax: syntax.md
  - Examples: examples.md
  - Development: development.md
