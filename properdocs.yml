site_name: MarkFeyn
site_description: Render simple Feynman diagram code blocks as native SVG in MkDocs and ProperDocs.
theme:
  name: materialx
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.footnote.tooltips
plugins:
  - feynman-diagrams
  - table-reader


markdown_extensions:
  - tables
  - footnotes
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: feynman
          class: language-feynman
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Syntax: syntax.md
  - Examples:
      - Overview: examples/index.md
      - Scattering & decays:
          - Electron-positron annihilation: examples/electron-positron-annihilation.md
          - Scalar exchange: examples/scalar-exchange.md
          - Emission: examples/emission.md
          - Mixed vertex: examples/mixed-vertex.md
          - Meson decay and mixing: examples/meson-decay-and-mixing.md
      - Symmetric layout:
          - Without process roles: examples/symmetric-mode-without-process-roles.md
      - Vertices:
          - Vertex shapes: examples/vertex-shapes.md
      - Layout:
          - Layout algorithms: examples/layout-algorithms.md
          - Vertical orientation: examples/vertical-orientation.md
          - Invisible layout edge: examples/invisible-layout-edge.md
          - Manual placement: examples/manual-placement.md
          - Label placement: examples/label-placement.md
      - Loops:
          - Loop diagrams: examples/loops.md
          - Box diagram: examples/box-diagram.md
          - Two-loop regions: examples/two-loop-regions.md
      - From the literature:
          - Published paper diagrams: examples/published-papers.md
  - Development: development.md
