site_name: MarkFeyn
site_description: Render simple Feynman diagram code blocks as native SVG in MkDocs and ProperDocs.
theme:
  name: materialx
  features:
    - navigation.tabs
    - navigation.instant
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.footnote.tooltips
plugins:
  - feynman-diagrams
#   - table-reader


markdown_extensions:
#   - tables
  - meta
  - footnotes
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      line_spans: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: feynman
          class: language-feynman
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format


extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@4/tex-svg.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Syntax: syntax.md
  - Examples: 
      - Overview: examples/index.md
      - Scattering & decays: examples/scattering-decays.md
      - Symmetric layout: examples/symmetric-layout.md
      - Edges: examples/edges.md
      - Vertices: examples/vertices.md
      - Layout: examples/layout.md
      - Loops: examples/loops.md
      - From the literature: examples/from-the-literature.md
  - Development: development.md
