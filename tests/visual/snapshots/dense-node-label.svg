<svg style="--feynman-diagram-width: 360px;" aria-labelledby="feynman-title-1" viewBox="0 0 360 220" height="220" width="360" role="img" class="feynman-diagram__svg">
<title id="feynman-title-1">Feynman diagram</title>
<defs>
<marker markerUnits="strokeWidth" orient="auto" refY="4" refX="7" markerHeight="11" markerWidth="11" id="feynman-arrow-1">
<path class="feynman-diagram__arrow" d="M0,0 L8,4 L0,8 Z" />
</marker>
<pattern height="8" width="8" patternUnits="userSpaceOnUse" id="feynman-hatch-diagonal-1">
<rect height="8" width="8" y="0" x="0" class="feynman-diagram__hatch-fill" />
<path d="M -2 10 L 10 -2" class="feynman-diagram__hatch-line" />
</pattern>
<pattern height="8" width="8" patternUnits="userSpaceOnUse" id="feynman-hatch-diagonal-reverse-1">
<rect height="8" width="8" y="0" x="0" class="feynman-diagram__hatch-fill" />
<path d="M -2 -2 L 10 10" class="feynman-diagram__hatch-line" />
</pattern>
<pattern height="8" width="8" patternUnits="userSpaceOnUse" id="feynman-hatch-cross-1">
<rect height="8" width="8" y="0" x="0" class="feynman-diagram__hatch-fill" />
<path d="M -2 10 L 10 -2" class="feynman-diagram__hatch-line" />
<path d="M -2 -2 L 10 10" class="feynman-diagram__hatch-line" />
</pattern>
<pattern height="7" width="7" patternUnits="userSpaceOnUse" id="feynman-hatch-horizontal-1">
<rect height="7" width="7" y="0" x="0" class="feynman-diagram__hatch-fill" />
<path d="M 0 2 L 7 2" class="feynman-diagram__hatch-line" />
</pattern>
<pattern height="7" width="7" patternUnits="userSpaceOnUse" id="feynman-hatch-vertical-1">
<rect height="7" width="7" y="0" x="0" class="feynman-diagram__hatch-fill" />
<path d="M 2 0 L 2 7" class="feynman-diagram__hatch-line" />
</pattern>
<pattern height="8" width="8" patternUnits="userSpaceOnUse" id="feynman-hatch-grid-1">
<rect height="8" width="8" y="0" x="0" class="feynman-diagram__hatch-fill" />
<path d="M 0 2 L 8 2" class="feynman-diagram__hatch-line" />
<path d="M 2 0 L 2 8" class="feynman-diagram__hatch-line" />
</pattern>
</defs>
<path d="M 70 62 L 290 62" class="feynman-diagram__edge feynman-diagram__edge--plain" />
<circle r="3.5" cy="86" cx="180" class="feynman-diagram__vertex feynman-diagram__vertex--dot" />
<text aria-label="CENTRALLABEL" dominant-baseline="middle" text-anchor="middle" y="116" x="180" class="feynman-diagram__label feynman-diagram__label--internal">
<tspan>CENTRAL</tspan>
<tspan font-size="82%" baseline-shift="sub">L</tspan>
<tspan>ABEL</tspan>
</text>
</svg>
