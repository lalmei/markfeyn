site_name: MarkFeyn
site_description: Render simple Feynman diagram code blocks as native SVG in MkDocs and ProperDocs.
theme:
  name: materialx
  features:
    - navigation.sections
    - navigation.instant
    - content.code.copy

plugins:
  - search
  - feynman-diagrams

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: feynman
          class: language-feynman
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Installation: installation.md
  - Syntax: syntax.md
  - Examples: examples.md
  - Development: development.md
